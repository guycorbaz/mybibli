name: Gates (reusable)

on:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  rust-tests:
    name: Rust tests + clippy + sqlx-prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # `cargo test --lib` covers the `#[sqlx::test]` cases introduced in story
    # 7-3 (src/routes/auth.rs language_tests and src/middleware/locale.rs
    # middleware_integration_tests). Those macros provision a throwaway DB via
    # `MARIADB_ROOT_PASSWORD` and need `DATABASE_URL` at runtime — otherwise
    # the process panics with `DATABASE_URL must be set: EnvVar(NotPresent)`.
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root_test
          MARIADB_DATABASE: mybibli_rust_test
          MARIADB_USER: test
          MARIADB_PASSWORD: test
        ports:
          - 3307:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=3s
          --health-timeout=3s
          --health-retries=20

    env:
      DATABASE_URL: mysql://root:root_test@127.0.0.1:3307/mybibli_rust_test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features mysql,rustls --locked

      - name: Clippy (zero warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit & bin tests
        run: cargo test --lib --bins

      # `cargo sqlx prepare --check` regenerates `.sqlx/` against a live DB to
      # compare with the committed cache. `#[sqlx::test]` creates throwaway DBs
      # via admin, so `mybibli_rust_test` itself stays empty — we need to run
      # the migrations manually here so the SQL macros resolve.
      - name: Apply migrations to rust-test DB
        run: sqlx migrate run --source ./migrations

      - name: Check SQLx offline metadata
        run: cargo sqlx prepare --check --workspace -- --all-targets

  db-integration:
    name: DB integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root_test
          MARIADB_DATABASE: mybibli_rust_test
          MARIADB_USER: test
          MARIADB_PASSWORD: test
        ports:
          - 3307:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=3s
          --health-timeout=3s
          --health-retries=20

    env:
      DATABASE_URL: mysql://root:root_test@127.0.0.1:3307/mybibli_rust_test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Run DB-backed integration tests
        run: |
          cargo test \
            --test find_similar \
            --test find_by_location_dewey \
            --test metadata_fetch_dewey \
            --test metadata_fetch_race \
            --test seeded_users

      - name: Collect MariaDB logs on failure
        if: failure() || cancelled()
        run: |
          set +e
          CID=$(docker ps --filter "ancestor=mariadb:10.11" --format '{{.ID}}' | head -1)
          if [ -n "$CID" ]; then
            docker logs "$CID" 2>&1 | tail -200 > /tmp/mariadb.log || true
          fi

      - name: Upload MariaDB logs on failure
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: mariadb-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/mariadb.log
          retention-days: 7
          if-no-files-found: ignore

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/e2e/package-lock.json') }}

      - name: Build and start E2E stack
        run: docker compose -f tests/e2e/docker-compose.test.yml up -d --build --wait

      - name: Install E2E deps
        working-directory: tests/e2e
        run: npm ci

      - name: Typecheck E2E (tsc --noEmit)
        working-directory: tests/e2e
        run: npx tsc --noEmit

      - name: Grep gate — no page.waitForTimeout in specs
        working-directory: tests/e2e
        run: |
          if grep -rE "waitForTimeout\(" specs/ helpers/; then
            echo "::error::page.waitForTimeout is forbidden — use DOM-state assertions."
            exit 1
          fi

      - name: Install Playwright Chromium
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright suite
        working-directory: tests/e2e
        run: npm test

      - name: Collect compose logs
        if: always()
        run: |
          docker compose -f tests/e2e/docker-compose.test.yml logs --no-color > /tmp/compose-logs.txt || true

      - name: Stop E2E stack
        if: always()
        run: docker compose -f tests/e2e/docker-compose.test.yml down -v || true

      - name: Upload Playwright report on failure
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload compose logs on failure
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/compose-logs.txt
          retention-days: 7
          if-no-files-found: ignore
