name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  verify-version:
    name: Verify Cargo.toml version matches tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check tag vs Cargo.toml
        id: check
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag $GITHUB_REF_NAME must match v<MAJOR>.<MINOR>.<PATCH> with no pre-release suffix"
            exit 1
          fi
          CARGO_VERSION=$(grep -E '^version = "[0-9]+\.[0-9]+\.[0-9]+"' Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION) — bump Cargo.toml and re-tag"
            exit 1
          fi
          echo "version=$CARGO_VERSION" >> "$GITHUB_OUTPUT"
          echo "Verified version $CARGO_VERSION matches tag $GITHUB_REF_NAME"

  rust-tests:
    needs: verify-version
    uses: ./.github/workflows/_gates.yml

  db-integration:
    needs: verify-version
    uses: ./.github/workflows/_gates.yml

  e2e:
    needs: verify-version
    uses: ./.github/workflows/_gates.yml

  publish:
    name: Build & push Docker Hub release tags
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [verify-version, rust-tests, db-integration, e2e]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: guycorbaz/mybibli
          tags: |
            type=raw,value=${{ needs.verify-version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"
