{# Admin → Users panel (story 8-3). #}
<section id="admin-users-panel" aria-labelledby="admin-users-heading">
    <h2 id="admin-users-heading" class="sr-only">{{ heading }}</h2>

    <div class="mb-4 flex flex-col gap-4">
        <div class="flex gap-2">
            <button hx-get="/admin/users/new" hx-target="#admin-users-form-slot" hx-swap="innerHTML" class="px-4 py-2 bg-blue-600 text-white rounded-md">{{ btn_new }}</button>
        </div>

        <form method="GET" action="/admin/users" hx-get="/admin/users" hx-target="#admin-users-panel" hx-swap="outerHTML" hx-push-url="true" class="flex gap-4 items-end" id="admin-users-filters">
            <div class="flex flex-col">
                <label for="filter-role" class="text-sm font-semibold mb-1">{{ filter_role_label }}</label>
                <select id="filter-role" name="role" class="px-3 py-2 border border-stone-300 dark:border-stone-700 rounded-md dark:bg-stone-800" hx-trigger="change" hx-get="/admin/users" hx-target="#admin-users-panel" hx-swap="outerHTML" hx-push-url="true">
                    <option value="">{{ filter_role_all }}</option>
                    <option value="librarian" {% if filter_role == "librarian" %}selected{% endif %}>{{ role_librarian }}</option>
                    <option value="admin" {% if filter_role == "admin" %}selected{% endif %}>{{ role_admin }}</option>
                </select>
            </div>

            <div class="flex flex-col">
                <label for="filter-status" class="text-sm font-semibold mb-1">{{ filter_status_label }}</label>
                <select id="filter-status" name="status" class="px-3 py-2 border border-stone-300 dark:border-stone-700 rounded-md dark:bg-stone-800" hx-trigger="change" hx-get="/admin/users" hx-target="#admin-users-panel" hx-swap="outerHTML" hx-push-url="true">
                    <option value="active" {% if filter_status == "active" %}selected{% endif %}>{{ filter_status_active }}</option>
                    <option value="deactivated" {% if filter_status == "deactivated" %}selected{% endif %}>{{ filter_status_deactivated }}</option>
                    <option value="all" {% if filter_status == "all" %}selected{% endif %}>{{ filter_status_all }}</option>
                </select>
            </div>
            <input type="hidden" name="page" value="{{ page }}">
        </form>
    </div>

    <div id="admin-users-form-slot" aria-live="polite"></div>

    <div id="admin-users-list">
        {% include "fragments/admin_users_table.html" %}
    </div>

    {% if total_pages > 1 %}
        <nav id="admin-users-pagination" aria-label="{{ pagination_aria }}" class="mt-4 flex items-center justify-center gap-2">
            {% if page > 1 %}
                <button hx-get="/admin/users?role={{ filter_role }}&status={{ filter_status }}&page={{ page - 1 }}" hx-target="#admin-users-list" hx-swap="innerHTML" hx-push-url="true" class="px-3 py-1 bg-stone-300 dark:bg-stone-700 rounded">«</button>
            {% endif %}
            <span class="text-sm">{{ page }} / {{ total_pages }}</span>
            {% if page < total_pages %}
                <button hx-get="/admin/users?role={{ filter_role }}&status={{ filter_status }}&page={{ page + 1 }}" hx-target="#admin-users-list" hx-swap="innerHTML" hx-push-url="true" class="px-3 py-1 bg-stone-300 dark:bg-stone-700 rounded">»</button>
            {% endif %}
        </nav>
    {% endif %}
</section>
