{# Volume states section list (story 8-4). #}
<ul id="admin-ref-volume-states-list" role="list" class="divide-y divide-stone-200 dark:divide-stone-700">
    {% if entries.is_empty() %}
        <li class="py-3 text-stone-500 dark:text-stone-400">{{ empty_state }}</li>
    {% else %}
        {% for entry in entries %}
            {% include "fragments/admin_ref_volume_state_row.html" %}
        {% endfor %}
    {% endif %}
</ul>
