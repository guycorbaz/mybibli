<div class="bg-white dark:bg-stone-800 border border-stone-300 dark:border-stone-600 rounded-lg p-4 max-w-md w-full">
    <h3 class="text-sm font-semibold text-stone-900 dark:text-stone-100 mb-3">{{ form_heading }}</h3>

    <form hx-post="/catalog/contributors/add"
          hx-target="#feedback-list"
          hx-swap="afterbegin"
          hx-disabled-elt="find button[type='submit']"
          class="flex flex-col gap-3"
          novalidate>

        <input type="hidden" name="title_id" value="{{ title_id }}">
        <input type="hidden" id="contributor-id-hidden" name="contributor_id" value="">

        <div class="relative">
            <label for="contributor-name-input" class="block text-xs font-medium text-stone-700 dark:text-stone-300 mb-1">
                {{ label_name }} <span class="text-red-500" aria-hidden="true">*</span>
            </label>
            <input type="text" id="contributor-name-input" name="contributor_name" required
                   aria-required="true"
                   maxlength="255"
                   autocomplete="off"
                   class="w-full px-3 py-2 border border-stone-300 dark:border-stone-600 rounded-md bg-white dark:bg-stone-700 text-stone-900 dark:text-stone-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 min-h-[44px] md:min-h-[36px]">
            <div id="contributor-autocomplete-dropdown" class="hidden absolute z-10 w-full mt-1 bg-white dark:bg-stone-800 border border-stone-300 dark:border-stone-600 rounded-md shadow-lg max-h-48 overflow-y-auto" role="listbox">
            </div>
        </div>

        <div>
            <label for="contributor-role-select" class="block text-xs font-medium text-stone-700 dark:text-stone-300 mb-1">
                {{ label_role }} <span class="text-red-500" aria-hidden="true">*</span>
            </label>
            <select id="contributor-role-select" name="role_id" required
                    aria-required="true"
                    class="w-full px-3 py-2 border border-stone-300 dark:border-stone-600 rounded-md bg-white dark:bg-stone-700 text-stone-900 dark:text-stone-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 min-h-[44px] md:min-h-[36px]">
                <option value="">--</option>
                {% for role in roles %}
                <option value="{{ role.0 }}">{{ role.1 }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="flex justify-end">
            <button type="submit"
                    class="px-3 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 min-h-[44px] md:min-h-[36px]">
                {{ label_submit }}
            </button>
        </div>
    </form>
</div>
