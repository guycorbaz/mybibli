<div class="w-full">
    <input type="text"
           id="scan-field"
           data-mybibli-scan-field
           data-isbn-error="{{ isbn_error }}"
           data-vcode-error="{{ vcode_error }}"
           autofocus
           aria-label="{{ scan_label }}"
           placeholder="{{ scan_placeholder }}"
           class="w-full h-12 px-4 text-base border border-stone-300 dark:border-stone-600 rounded-md bg-white dark:bg-stone-800 text-stone-900 dark:text-stone-100 placeholder-stone-400 dark:placeholder-stone-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
</div>
