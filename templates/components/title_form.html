<div class="bg-white dark:bg-stone-800 border border-stone-300 dark:border-stone-600 rounded-lg p-6 max-w-lg w-full">
    <h2 class="text-lg font-semibold text-stone-900 dark:text-stone-100 mb-4">{{ form_heading }}</h2>

    <form hx-post="/catalog/title"
          hx-target="#feedback-list"
          hx-swap="afterbegin"
          hx-disabled-elt="find button[type='submit']"
          class="flex flex-col gap-4"
          novalidate>

        <div>
            <label for="title-field" class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1">
                {{ label_title }} <span class="text-red-500" aria-hidden="true">*</span>
            </label>
            <input type="text" id="title-field" name="title" required
                   aria-required="true"
                   maxlength="500"
                   data-required-error="{{ required_error }}"
                   class="w-full px-3 py-2 border border-stone-300 dark:border-stone-600 rounded-md bg-white dark:bg-stone-700 text-stone-900 dark:text-stone-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 min-h-[44px] md:min-h-[36px]">
            <p class="field-error hidden text-xs text-red-600 dark:text-red-400 mt-1" aria-live="polite"></p>
        </div>

        <div>
            <label for="media-type-field" class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1">
                {{ label_media_type }} <span class="text-red-500" aria-hidden="true">*</span>
            </label>
            <select id="media-type-field" name="media_type" required
                    aria-required="true"
                    data-required-error="{{ required_error }}"
                    onchange="if(this.value){htmx.ajax('GET','/catalog/title/fields/'+this.value,{target:'#type-specific-fields',swap:'innerHTML'});}else{document.getElementById('type-specific-fields').innerHTML='';}"
                    class="w-full px-3 py-2 border border-stone-300 dark:border-stone-600 rounded-md bg-white dark:bg-stone-700 text-stone-900 dark:text-stone-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 min-h-[44px] md:min-h-[36px]">
                <option value="">--</option>
                <option value="book">{{ mt_book }}</option>
                <option value="bd">{{ mt_bd }}</option>
                <option value="cd">{{ mt_cd }}</option>
                <option value="dvd">{{ mt_dvd }}</option>
                <option value="magazine">{{ mt_magazine }}</option>
                <option value="report">{{ mt_report }}</option>
            </select>
            <p class="field-error hidden text-xs text-red-600 dark:text-red-400 mt-1" aria-live="polite"></p>
        </div>

        <div>
            <label for="genre-field" class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1">
                {{ label_genre }} <span class="text-red-500" aria-hidden="true">*</span>
            </label>
            <select id="genre-field" name="genre_id" required
                    aria-required="true"
                    data-required-error="{{ required_error }}"
                    class="w-full px-3 py-2 border border-stone-300 dark:border-stone-600 rounded-md bg-white dark:bg-stone-700 text-stone-900 dark:text-stone-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 min-h-[44px] md:min-h-[36px]">
                <option value="0">--</option>
                {% for genre in genres %}
                <option value="{{ genre.id }}">{{ genre.name }}</option>
                {% endfor %}
            </select>
            <p class="field-error hidden text-xs text-red-600 dark:text-red-400 mt-1" aria-live="polite"></p>
        </div>

        <div>
            <label for="language-field" class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1">
                {{ label_language }} <span class="text-red-500" aria-hidden="true">*</span>
            </label>
            <input type="text" id="language-field" name="language" value="fr" required
                   aria-required="true"
                   maxlength="10"
                   data-required-error="{{ required_error }}"
                   class="w-full px-3 py-2 border border-stone-300 dark:border-stone-600 rounded-md bg-white dark:bg-stone-700 text-stone-900 dark:text-stone-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 min-h-[44px] md:min-h-[36px]">
            <p class="field-error hidden text-xs text-red-600 dark:text-red-400 mt-1" aria-live="polite"></p>
        </div>

        <div>
            <label for="subtitle-field" class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1">
                {{ label_subtitle }}
            </label>
            <input type="text" id="subtitle-field" name="subtitle"
                   maxlength="500"
                   class="w-full px-3 py-2 border border-stone-300 dark:border-stone-600 rounded-md bg-white dark:bg-stone-700 text-stone-900 dark:text-stone-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 min-h-[44px] md:min-h-[36px]">
        </div>

        <div>
            <label for="publisher-field" class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1">
                {{ label_publisher }}
            </label>
            <input type="text" id="publisher-field" name="publisher"
                   maxlength="255"
                   class="w-full px-3 py-2 border border-stone-300 dark:border-stone-600 rounded-md bg-white dark:bg-stone-700 text-stone-900 dark:text-stone-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 min-h-[44px] md:min-h-[36px]">
        </div>

        <div>
            <label for="publication-date-field" class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1">
                {{ label_publication_date }}
            </label>
            <input type="text" id="publication-date-field" name="publication_date"
                   placeholder="YYYY-MM-DD"
                   pattern="\d{4}(-\d{2}(-\d{2})?)?"
                   class="w-full px-3 py-2 border border-stone-300 dark:border-stone-600 rounded-md bg-white dark:bg-stone-700 text-stone-900 dark:text-stone-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 min-h-[44px] md:min-h-[36px]">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div>
                <label for="isbn-field" class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1">
                    {{ label_isbn }}
                </label>
                <input type="text" id="isbn-field" name="isbn"
                       maxlength="13"
                       class="w-full px-3 py-2 border border-stone-300 dark:border-stone-600 rounded-md bg-white dark:bg-stone-700 text-stone-900 dark:text-stone-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 min-h-[44px] md:min-h-[36px]">
            </div>
            <div>
                <label for="issn-field" class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1">
                    {{ label_issn }}
                </label>
                <input type="text" id="issn-field" name="issn"
                       maxlength="8"
                       class="w-full px-3 py-2 border border-stone-300 dark:border-stone-600 rounded-md bg-white dark:bg-stone-700 text-stone-900 dark:text-stone-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 min-h-[44px] md:min-h-[36px]">
            </div>
            <div>
                <label for="upc-field" class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1">
                    {{ label_upc }}
                </label>
                <input type="text" id="upc-field" name="upc"
                       maxlength="13"
                       class="w-full px-3 py-2 border border-stone-300 dark:border-stone-600 rounded-md bg-white dark:bg-stone-700 text-stone-900 dark:text-stone-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 min-h-[44px] md:min-h-[36px]">
            </div>
        </div>

        <div id="type-specific-fields">
            <!-- Media type-specific fields loaded via HTMX -->
        </div>

        <div class="flex justify-end gap-3 mt-2">
            <button type="button"
                    class="px-4 py-2 text-sm font-medium text-stone-700 dark:text-stone-300 border border-stone-300 dark:border-stone-600 rounded-md hover:bg-stone-50 dark:hover:bg-stone-700 min-h-[44px] md:min-h-[36px]"
                    onclick="document.getElementById('title-form-container').innerHTML=''; document.getElementById('scan-field').focus();">
                {{ label_cancel }}
            </button>
            <button type="submit"
                    class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 min-h-[44px] md:min-h-[36px]">
                {{ label_submit }}
            </button>
        </div>
    </form>

    <script>
    (function() {
        var requiredIds = ['title-field', 'media-type-field', 'genre-field', 'language-field'];

        function isEmpty(el) {
            var v = el.value;
            if (el.tagName === 'SELECT') {
                return v === '' || v === '0';
            }
            return v.trim() === '';
        }

        function showError(el) {
            var errP = el.parentElement.querySelector('.field-error');
            if (!errP) return;
            var msg = el.getAttribute('data-required-error') || 'Required';
            errP.textContent = msg;
            errP.classList.remove('hidden');
            el.classList.add('border-red-500');
        }

        function hideError(el) {
            var errP = el.parentElement.querySelector('.field-error');
            if (!errP) return;
            errP.textContent = '';
            errP.classList.add('hidden');
            el.classList.remove('border-red-500');
        }

        requiredIds.forEach(function(id) {
            var el = document.getElementById(id);
            if (!el) return;

            el.addEventListener('blur', function() {
                if (isEmpty(el)) { showError(el); }
            });

            el.addEventListener('input', function() {
                hideError(el);
            });

            el.addEventListener('change', function() {
                hideError(el);
            });
        });

        var form = document.querySelector('#title-form-container form');
        if (form) {
            form.addEventListener('submit', function(e) {
                var hasError = false;
                requiredIds.forEach(function(id) {
                    var el = document.getElementById(id);
                    if (el && isEmpty(el)) {
                        showError(el);
                        hasError = true;
                    }
                });
                if (hasError) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                }
            });
        }
    })();
    </script>
</div>
