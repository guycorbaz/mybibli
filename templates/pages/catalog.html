{% extends "layouts/base.html" %}

{% block title %}{{ catalog_title }} — mybibli{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto px-4 lg:px-8 py-6 flex flex-col gap-4">
    <h1 class="text-2xl font-bold text-stone-900 dark:text-stone-100">{{ catalog_title }}</h1>

    <div class="flex flex-col">
        <div class="order-1 lg:order-3" id="feedback-list-container">
            <div id="feedback-list" aria-live="polite" class="space-y-2">
                <!-- Feedback entries appended here by HTMX -->
            </div>
        </div>

        <div class="order-2 lg:order-2">
            {% include "components/catalog_toolbar.html" %}
        </div>

        <div class="order-3 lg:order-1">
            {% include "components/scan_field.html" %}
        </div>
    </div>
</div>
{% endblock %}
