{% extends "layouts/base.html" %}

{% block title %}{{ catalog_title }} — mybibli{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto px-4 lg:px-8 py-6 flex flex-col gap-4">
    <h1 class="text-2xl font-bold text-stone-900 dark:text-stone-100">{{ catalog_title }}</h1>

    <div id="context-banner" class="hidden">
        <!-- Context banner populated via OOB swap -->
    </div>

    <div id="contributor-list" class="text-sm">
        <!-- Contributor list populated via OOB swap -->
    </div>

    <div class="flex flex-col">
        <div class="order-1 lg:order-3" id="feedback-list-container">
            <div id="feedback-list" aria-live="polite" aria-relevant="additions" class="space-y-2">
                <!-- Feedback entries appended here by HTMX -->
            </div>
        </div>

        <div class="order-2 lg:order-2 flex items-center gap-3">
            {% include "components/catalog_toolbar.html" %}
            <button type="button" id="new-title-btn"
                    class="px-3 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-md min-h-[44px] md:min-h-[36px]"
                    onclick="htmx.ajax('GET', '/catalog/title/new', {target: '#title-form-container', swap: 'innerHTML'})">
                + {{ new_title_label }}
            </button>
        </div>

        <div class="order-3 lg:order-1">
            {% include "components/scan_field.html" %}
        </div>
    </div>

    <div id="title-form-container">
        <!-- Title creation form loaded via HTMX -->
    </div>

    <div id="contributor-form-container">
        <!-- Contributor form loaded via HTMX or inline -->
    </div>
</div>
{% endblock %}
