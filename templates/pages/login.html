{% extends "layouts/base.html" %}

{% block title %}{{ login_title }} — mybibli{% endblock %}

{% block content %}
<div class="flex min-h-[60vh] items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center text-stone-900 dark:text-stone-100 mb-6">{{ login_title }}</h1>

        {% if !error_message.is_empty() %}
        <div class="p-3 mb-4 border-l-4 border-red-500 bg-red-50 dark:bg-red-900/20 rounded-r text-red-700 dark:text-red-300 text-sm" role="alert">
            {{ error_message }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-4">
            {% if !next.is_empty() %}
            <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            <div>
                <label for="username" class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1">{{ username_label }}</label>
                <input type="text" id="username" name="username" required autofocus
                       autocomplete="username"
                       class="w-full px-3 py-2 border border-stone-300 dark:border-stone-600 rounded-md bg-white dark:bg-stone-800 text-stone-900 dark:text-stone-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 min-h-[44px]">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1">{{ password_label }}</label>
                <input type="password" id="password" name="password" required
                       autocomplete="current-password"
                       class="w-full px-3 py-2 border border-stone-300 dark:border-stone-600 rounded-md bg-white dark:bg-stone-800 text-stone-900 dark:text-stone-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 min-h-[44px]">
            </div>

            <button id="login-submit" type="submit"
                    class="w-full px-4 py-2 text-white bg-indigo-600 hover:bg-indigo-700 rounded-md font-medium min-h-[44px]">
                {{ submit_label }}
            </button>
        </form>

        <p class="mt-4 text-center text-sm text-stone-500 dark:text-stone-400">
            <a href="/" class="text-indigo-600 dark:text-indigo-400 hover:underline">{{ back_to_home }}</a>
        </p>
    </div>
</div>
{% endblock %}
