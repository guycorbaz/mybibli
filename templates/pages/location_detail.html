{% extends "layouts/base.html" %}

{% block title %}{{ location.name }} — mybibli{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8">
    <nav class="text-sm text-stone-500 dark:text-stone-400 mb-4" aria-label="Breadcrumb">
        {{ path }}
    </nav>
    <h1 class="text-2xl font-bold text-stone-900 dark:text-stone-100">{{ location.name }}</h1>
    <p class="mt-1 text-sm text-stone-400">{{ location.label }} · {{ location.node_type }}</p>
    <div class="mt-8 text-center text-stone-500 dark:text-stone-400">
        <p>{{ coming_soon }}</p>
    </div>
</div>
{% endblock %}
