<!DOCTYPE html>
<html lang="{{ lang }}" class="h-full">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token|e }}">
    <title>{% block title %}mybibli{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/output.css">
    <link rel="stylesheet" href="/static/css/browse.css">
    <!-- Tell HTMX NOT to inject its inline `.htmx-indicator { ... }` <style>
         block (CSP `style-src 'self'` blocks it). The same rules live in
         browse.css. Must come BEFORE the htmx script. -->
    <meta name="htmx-config" content='{"includeIndicatorStyles":false}'>
    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/theme.js"></script>
    {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}bg-stone-50 text-stone-900 dark:bg-stone-900 dark:text-stone-100 min-h-full{% endblock %}" data-page="{{ current_page }}" data-user-role="{{ role }}"{% if role != "anonymous" %} data-session-timeout="{{ session_timeout_secs }}"{% endif %}>
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-50 focus:bg-white focus:px-4 focus:py-2 focus:rounded focus:shadow">{{ skip_label }}</a>
    {% include "components/nav_bar.html" %}
    <main id="main-content">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/js/scan-field.js"></script>
    <script src="/static/js/search.js"></script>
    <script src="/static/js/browse-mode.js"></script>
    <script src="/static/js/focus.js"></script>
    <script src="/static/js/contributor.js"></script>
    <script src="/static/js/session-timeout.js"></script>
    <script src="/static/js/audio.js"></script>
    <script src="/static/js/title-form.js"></script>
    <script src="/static/js/borrowers.js"></script>
    <script src="/static/js/loan-borrower-search.js"></script>
    <script src="/static/js/scanner-guard.js"></script>
    <script src="/static/js/csrf.js"></script>
    <script src="/static/js/mybibli.js" defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
