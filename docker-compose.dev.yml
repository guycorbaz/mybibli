services:
  mybibli:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: mysql://mybibli:mybibli_password@db:3306/mybibli?charset=utf8mb4
      HOST: "0.0.0.0"
      PORT: "8080"
      RUST_LOG: mybibli=debug,tower_http=debug
      APP_LANGUAGE: "en"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mybibli
      MYSQL_USER: mybibli
      MYSQL_PASSWORD: mybibli_password
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
