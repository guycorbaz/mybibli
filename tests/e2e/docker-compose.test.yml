services:
  mybibli:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: mysql://mybibli:mybibli_test@db:3306/mybibli_test?charset=utf8mb4
      HOST: "0.0.0.0"
      PORT: "8080"
      RUST_LOG: mybibli=debug
      APP_LANGUAGE: "en"
      BNF_API_BASE_URL: "http://mock-metadata:9090"
      GOOGLE_BOOKS_API_BASE_URL: "http://mock-metadata:9090"
      OPEN_LIBRARY_API_BASE_URL: "http://mock-metadata:9090"
      MUSICBRAINZ_API_BASE_URL: "http://mock-metadata:9090"
      OMDB_API_BASE_URL: "http://mock-metadata:9090"
      OMDB_API_KEY: "test-omdb-key"
      TMDB_API_BASE_URL: "http://mock-metadata:9090"
      TMDB_API_KEY: "test-tmdb-key"
      COVERS_DIR: "/tmp/test-covers"
    depends_on:
      db:
        condition: service_healthy
      mock-metadata:
        condition: service_started

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root_test
      MYSQL_DATABASE: mybibli_test
      MYSQL_USER: mybibli
      MYSQL_PASSWORD: mybibli_test
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  mock-metadata:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./mock-metadata-server:/app
    command: python server.py
    ports:
      - "9090:9090"
